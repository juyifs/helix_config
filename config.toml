theme = "everforest_light"

[editor]
line-number = "absolute"
mouse = false
cursorline = true
bufferline = "multiple"
color-modes = true
true-color = true
auto-completion = true
completion-trigger-len = 1
idle-timeout = 0
gutters = ["diff", "diagnostics", "line-numbers", "spacer"]
clipboard-provider = "termcode"


[editor.whitespace]
render = "all"

[editor.indent-guides]
render = true
skip-levels = 1
character = "╎"


[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "|"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true

[keys.normal]
"C-s" = ":w"
"C-q" = "jump_backward"
space.q = ":q"
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = ["paste_clipboard_after"]
space.space = "file_picker"
space.b.d = ":bc"
space.b.o = ":bco"
space.f.f = "file_picker"
space.f.F = "file_picker_in_current_directory"
space.f.b = "buffer_picker"
space.s.s = "symbol_picker"
space.s.S = "workspace_symbol_picker"
space.s.b = [":sh echo %{buffer_name} | pbcopy", "global_search"]
space.s.g = "global_search"
space.s.w = ["move_char_right", "move_prev_word_start", "move_next_word_end", "search_selection", "global_search"]

[keys.insert]
"C-s" = ["normal_mode",":w"]
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = ["paste_clipboard_after"]

[keys.select]
"C-s" = ["normal_mode", ":w"]
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = ["replace_selections_with_clipboard"]
