theme = "everforest_light"

[editor]
line-number = "absolute"
mouse = true
cursorline = true
bufferline = "multiple"
color-modes = true
true-color = true
completion-trigger-len = 1
idle-timeout = 0
gutters = ["diff", "diagnostics", "line-numbers", "spacer"]
clipboard-provider = "termcode"


[editor.whitespace]
render = "all"

[editor.indent-guides]
render = true
skip-levels = 1
character = "╎"


[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "|"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true

[keys.normal]
"C-s" = ":w"
"C-q" = "jump_backward"
space.q = ":q"
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = [":clipboard-paste-after"]
space.space = "file_picker"

[keys.insert]
"C-s" = ["normal_mode",":w"]
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = [":clipboard-paste-after"]

[keys.select]
"C-s" = ["normal_mode", ":w"]
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = ["normal_mode",":clipboard-paste-replace"]
