theme = "everforest_dark"

[editor]
line-number = "absolute"
mouse = true
cursorline = true
bufferline = "multiple"
color-modes = true
true-color = true
auto-completion = true
completion-trigger-len = 1
idle-timeout = 0
gutters = ["diff", "diagnostics", "line-numbers", "spacer"]
clipboard-provider = "termcode"


[editor.whitespace]
render = "all"

[editor.indent-guides]
render = true
skip-levels = 1
character = "╎"


[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = [
  "diagnostics",
  "selections",
  "position",
  "file-encoding",
  "file-line-ending",
  "file-type",
]
separator = "|"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true

[keys.normal]
"C-s" = ":w"
"C-q" = "jump_backward"
space.q = ":q"
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = ["paste_clipboard_after"]
space.space = "file_picker"
space.b.d = ":bc!"
space.b.o = ":bco"
space.f.f = "file_picker"
space.f.F = "file_picker_in_current_directory"
space.f.b = "buffer_picker"
space.s.s = "symbol_picker"
space.s.S = "workspace_symbol_picker"
space.s.b = "@:clear-register<ret><space>/ %p <C-r>%<C-a>"
space.s.g = [":clear-register", "global_search"]
space.s.w = "@lbe*<space>/(?-i)<C-r>/"
space.s.W = "@lbe*<space>/(?-i)<C-r>/ %p <C-r>%"
"/" = [":clear-register", "search"]
tab = ":buffer-next"
S-tab = ":buffer-previous"
space.g.g = [
  ":write-all",             # 先把所有缓冲区保存
  ":new",                   # 打开一个临时空缓冲区
  ":insert-output lazygit", # 在该缓冲区里运行 lazygit（占满界面）
  ":buffer-close!",         # 退出 lazygit 后，关闭这个临时缓冲区
  ":redraw",                # 重绘 UI
  ":reload-all",            # 重新加载文件，刷新 Git 侧边标记
  ":set mouse false",       # 强制关闭以重置状态
  ":set mouse true",        # 重新启用鼠标支持
]

space.g.l = [
  ":open %sh{ tmp=$(mktemp -t hx_gitlog.XXXXXX); git --no-pager log -p --date=iso --format='format:%%h (%%an %%ad) %%s' -L%{cursor_line},+1:%{buffer_name} >\"$tmp\" 2>&1; echo \"$tmp\"; }",
  ":set-language diff",
]

space.g.b = [
  "extend_to_line_bounds",
  ":open %sh{ tmp=$(mktemp -t hx_gitlog.XXXXXX); git --no-pager log -p --date=iso --format='format:%%h (%%an %%ad) %%s' -L%{selection_line_start},%{selection_line_end}:%{buffer_name} >\"$tmp\" 2>&1; echo \"$tmp\"; }",
  ":set-language diff",
]

space.c.f = ":pipe ~/.config/helix/my-formatter.sh %{buffer_name}"
space.c.F = ":format"
space.c.c = "toggle_comments"
"["."s" = "@maf<A-;>;"
space.f.c = "changed_file_picker"
space.g.r = ":reset-diff-change"
space.c.r = ":config-reload"
space.s.j = "save_selection"
# 保存书签：提示输入备注，并发送当前文件、行号和备注到脚本
S-m = "@:sh ~/.config/helix/hx-bookmark.sh add %{file_path_absolute} %{cursor_line} "
# 查看并跳转：打开书签文件，手动跳转 (Helix 暂不支持直接解析外部输出并跳转)
space.s.m = [":open ./.helix/.helix_bookmarks",":reload"]
# “跳转到书签”：选中当前行，将其作为 :open 的参数执行
# 这会解析 path:line 格式
g.b = [
  "goto_line_start",
  "select_mode", 
  "goto_line_end",       # 选中到行末（但不包含换行符）
  ":open %{selection}",
  "exit_select_mode"
]


[keys.insert]
"C-s" = ["normal_mode", ":w"]
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = ["paste_clipboard_after"]

[keys.select]
"C-s" = ["normal_mode", ":w"]
"C-c" = ["yank_main_selection_to_clipboard"]
"C-v" = ["replace_selections_with_clipboard"]
